<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
    <meta name="theme-color" content="#0F172A" />
    <title>KeepUp</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; transition: none !important; animation-duration: 0s !important; }
      html, body { height: 100%; background: #0a0e28; }
      body { display: flex; justify-content: center; align-items: flex-start; }
      #root {
        display: flex;
        flex-direction: column;
        height: 100vh;
        width: 100%;
        max-width: 430px;
        overflow: hidden;
        position: relative;
        box-shadow: 0 0 60px rgba(0,0,0,0.6);
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
